name: flow-cytometry-collator

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: "${FLOW_COLLATOR_BASE_PATH:-/flow-cytometry-collator}"
    environment:
      APP_BASE_PATH: "${FLOW_COLLATOR_BASE_PATH:-/flow-cytometry-collator}"
    init: true
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "${FLOW_COLLATOR_BIND_ADDRESS:-127.0.0.1}:${FLOW_COLLATOR_PORT:-3160}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000' + process.env.APP_BASE_PATH + '/')
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
